<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MBB Case Prep Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#101014; --card:#17171D; --card2:#1D1E26; --line:#2A2B36;
  --txt:#EDEBE4; --dim:#8F94A6; --acc:#89A9CF; --gold:#CE8147;
  --grn:#57C983; --red:#E5695E; --yel:#E8B33C;
  --disp:'Marcellus',Georgia,'Times New Roman',serif;
  --sans:'IBM Plex Sans',system-ui,-apple-system,'Segoe UI',sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font:15px/1.6 var(--sans);padding-bottom:70px;border-top:3px solid var(--gold)}
.wrap{max-width:1020px;margin:0 auto;padding:18px}
header{display:block;border-bottom:3px double var(--line);padding:12px 0 16px;margin-bottom:4px}
.eyebrow{font:600 10px/1 var(--sans);letter-spacing:.24em;text-transform:uppercase;color:var(--gold);margin-bottom:9px}
h1{font:400 30px/1.12 var(--disp);color:var(--txt);letter-spacing:.01em;text-wrap:balance}
.sub{display:block;color:var(--dim);font-size:12px;letter-spacing:.05em;margin-top:7px}
nav{display:flex;flex-direction:column;gap:0;margin:10px 0 22px}
.navrow{display:flex;gap:2px;flex-wrap:wrap;align-items:stretch;border-bottom:1px solid var(--line)}
.navtag{font:600 9.5px/1 var(--sans);color:var(--dim);text-transform:uppercase;letter-spacing:.18em;align-self:center;margin-right:10px;padding-left:2px}
nav button{background:none;border:0;border-bottom:2px solid transparent;color:var(--dim);padding:9px 10px 8px;border-radius:0;cursor:pointer;font:600 11.5px var(--sans);letter-spacing:.07em;text-transform:uppercase;margin-bottom:-1px}
nav button:hover{color:var(--txt)}
nav button.on{background:none;color:var(--gold);border-bottom-color:var(--gold)}
nav button .b{display:inline-block;min-width:17px;padding:1px 5px;margin-left:5px;border-radius:8px;background:var(--gold);color:#101014;font-size:10px;text-align:center;letter-spacing:0}
section{display:none}
section.on{display:block;animation:fade .18s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.card{background:var(--card);border:1px solid var(--line);border-radius:6px;padding:20px 20px 16px;margin-bottom:14px}
.card h2{font:400 18px/1.25 var(--disp);letter-spacing:.02em;margin-bottom:10px;color:var(--gold)}
.card h3{font:600 11px/1.4 var(--sans);text-transform:uppercase;letter-spacing:.13em;margin:12px 0 6px;color:var(--acc)}
.grid{display:grid;gap:12px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:720px){.g2,.g3,.g4{grid-template-columns:1fr 1fr}}
.stat{background:var(--card2);border:1px solid var(--line);border-radius:4px;padding:12px;text-align:center}
.stat .v{font:700 21px/1.3 var(--mono);font-variant-numeric:tabular-nums}
.stat .l{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.11em;margin-top:3px}
.bar{height:8px;background:#15161C;border-radius:5px;overflow:hidden;margin-top:6px}
.bar i{display:block;height:100%;border-radius:5px;background:linear-gradient(90deg,var(--acc),var(--grn))}
.qbox{font-size:17px;font-weight:600;line-height:1.5;margin:8px 0 14px}
.scen{background:var(--card2);border-left:3px solid var(--acc);border-radius:0 4px 4px 0;padding:12px 14px;margin:10px 0;font-size:14.5px}
.scen b{color:var(--gold)}
.ans{background:#14151B;border:1px solid var(--line);border-radius:4px;padding:14px;margin:12px 0;font-size:14.5px;display:none;white-space:pre-wrap}
.ans.show{display:block;animation:fade .18s ease}
.ans .k{color:var(--acc);font-weight:700}
.ans .num{color:var(--gold);font-weight:700;font-family:var(--mono);font-size:.95em;font-variant-numeric:tabular-nums}
.tip{background:rgba(206,129,71,.07);border:1px solid rgba(206,129,71,.35);border-radius:4px;padding:9px 12px;margin-top:10px;font-size:13px;white-space:normal}
.tip b{color:var(--gold)}
.btnrow{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0;align-items:center}
button.act{background:var(--gold);color:#101014;border:0;padding:9px 16px;border-radius:3px;font-weight:700;cursor:pointer;font-size:13px;font-family:var(--sans);letter-spacing:.02em}
button.act:hover{background:#DC935C}
button.ghost{background:transparent;color:var(--txt);border:1px solid var(--line);padding:9px 16px;border-radius:3px;font-weight:600;cursor:pointer;font-size:13px;font-family:var(--sans)}
button.ghost:hover{border-color:var(--acc)}
button.gA{background:rgba(87,201,131,.15);border:1px solid var(--grn);color:var(--grn)}
button.gN{background:rgba(232,179,60,.15);border:1px solid var(--yel);color:var(--yel)}
button.gD{background:rgba(229,105,94,.15);border:1px solid var(--red);color:var(--red)}
button:disabled{opacity:.4;cursor:default}
.grade{display:none;gap:8px;margin-top:10px}
.grade.show{display:flex;flex-wrap:wrap}
input[type=number],input[type=text]{background:#15161C;border:1px solid var(--line);color:var(--txt);padding:9px 12px;border-radius:3px;font-size:14.5px;width:160px;font-family:var(--mono);font-variant-numeric:tabular-nums}
textarea{width:100%;min-height:100px;background:#15161C;border:1px solid var(--line);border-radius:4px;color:var(--txt);padding:10px;font-size:14px;font-family:var(--sans);resize:vertical}
select{background:#15161C;color:var(--txt);border:1px solid var(--line);border-radius:3px;padding:8px;font-family:var(--sans);font-size:13px}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--acc)}
.ok{color:var(--grn);font-weight:700}
.bad{color:var(--red);font-weight:700}
.wr{color:var(--yel);font-weight:700}
.timer{font:700 24px var(--mono);font-variant-numeric:tabular-nums;color:var(--acc)}
.timer.low{color:var(--red)}
.pill{display:inline-block;font:700 10px/1.7 var(--sans);text-transform:uppercase;letter-spacing:.06em;padding:2px 9px;border-radius:10px;margin-right:6px;vertical-align:2px}
.p-diag{background:rgba(206,129,71,.15);color:var(--gold)}
.p-size{background:rgba(137,169,207,.15);color:var(--acc)}
.p-drill{background:rgba(87,201,131,.15);color:var(--grn)}
.kbd{color:var(--dim);font-size:11.5px;margin-top:8px}
.kbd b{background:var(--card2);border:1px solid var(--line);border-radius:4px;padding:1px 6px;font-family:var(--mono)}
.prog{color:var(--dim);font-size:12.5px;margin-bottom:8px}
.mrow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px dashed #2E2F3C;font-size:13.5px;gap:10px}
.mrow:last-child{border-bottom:0}
.mrow .mb{flex:1;margin:0 12px}
footer{position:fixed;bottom:0;left:0;right:0;background:rgba(16,16,20,.95);border-top:1px solid var(--line);padding:8px 18px;font:400 10.5px var(--mono);letter-spacing:.03em;color:var(--dim);text-align:center;backdrop-filter:blur(6px)}
/* playground layout */
.pg{display:grid;grid-template-columns:310px 1fr;gap:14px;align-items:start}
@media(max-width:800px){.pg{grid-template-columns:1fr}}
.panel{background:var(--card2);border:1px solid var(--line);border-radius:4px;padding:12px;margin-bottom:12px}
.panel h3{margin-top:0}
.sl{margin:9px 0}
.sl-h{display:flex;justify-content:space-between;gap:8px;font-size:12.5px;color:var(--dim);margin-bottom:3px}
.sl-h b{color:var(--txt);font-family:var(--mono);font-size:11.5px;font-weight:600;font-variant-numeric:tabular-nums;text-align:right}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:6px;background:#15161C;border-radius:4px;outline:none;cursor:pointer;padding:0;border:0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:16px;height:16px;border-radius:50%;background:var(--acc);border:2px solid #101014;cursor:pointer}
input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--acc);border:2px solid #101014;cursor:pointer}
.seg{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.seg button{background:#15161C;border:1px solid var(--line);color:var(--dim);padding:6px 10px;border-radius:3px;cursor:pointer;font-size:12px;font-weight:600;font-family:var(--sans)}
.seg button.on{border-color:var(--acc);color:var(--acc);background:rgba(137,169,207,.1)}
.wfall{display:flex;gap:5px;margin:8px 0 2px}
.wcol{flex:1;display:flex;flex-direction:column;align-items:center;min-width:0}
.wstack{display:flex;flex-direction:column;justify-content:flex-end;align-items:center;width:100%;height:172px}
.wblk{width:100%;border-radius:4px;transition:height .12s ease,margin-bottom .12s ease}
.wlab{font-size:10px;color:var(--dim);text-align:center;margin-top:4px;line-height:1.25}
.wval{font:600 10px var(--mono);font-variant-numeric:tabular-nums;margin-bottom:2px}
.hbar{display:flex;height:24px;border-radius:3px;overflow:hidden;background:#15161C;font:700 10.5px var(--mono)}
.hbar div{display:flex;align-items:center;justify-content:center;white-space:nowrap;overflow:hidden;transition:width .12s ease;color:#101014}
.hbar+.hbar{margin-top:6px}
.callout{border-radius:4px;padding:8px 11px;margin-top:8px;font-size:12.8px;border:1px solid}
.co-i{background:rgba(137,169,207,.07);border-color:rgba(137,169,207,.35)}
.co-w{background:rgba(232,179,60,.07);border-color:rgba(232,179,60,.4)}
.co-r{background:rgba(229,105,94,.07);border-color:rgba(229,105,94,.4)}
.co-g{background:rgba(87,201,131,.07);border-color:rgba(87,201,131,.4)}
.chal{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px dashed #2E2F3C;font-size:12.5px}
.chal:last-child{border-bottom:0}
.chal .cbx{width:17px;height:17px;border-radius:3px;border:1.5px solid var(--dim);flex:none;margin-top:1px;text-align:center;line-height:15px;font-size:11px}
.chal.done .cbx{background:var(--grn);border-color:var(--grn);color:#101014}
.chal.done{color:var(--dim)}
.gauge{height:14px;background:#15161C;border-radius:4px;position:relative;overflow:hidden;margin:8px 0 2px}
.gauge .z{position:absolute;top:0;left:50%;width:1.5px;height:100%;background:var(--dim);z-index:1}
.gauge .f{position:absolute;top:0;height:100%;transition:all .12s ease}
.toast{position:fixed;right:16px;bottom:60px;background:var(--grn);color:#101014;font-weight:700;padding:10px 16px;border-radius:4px;font-size:13px;opacity:0;transform:translateY(8px);transition:all .3s ease;z-index:50;pointer-events:none;max-width:320px}
.toast.show{opacity:1;transform:none}
/* accordions (case map / pe reference) */
.acc-h{cursor:pointer;padding:11px 14px;background:var(--card2);border:1px solid var(--line);border-radius:4px;margin-top:8px;font-weight:600;font-size:14px;display:flex;justify-content:space-between}
.acc-h:hover{border-color:var(--acc)}
.acc-b{display:none;padding:12px 16px;border:1px solid var(--line);border-top:none;border-radius:0 0 4px 4px;font-size:13.5px;white-space:pre-wrap;background:#14151B}
.acc-h.open+.acc-b{display:block}
.opt{display:block;width:100%;text-align:left;background:var(--card2);border:1px solid var(--line);border-radius:4px;padding:10px 13px;margin-top:8px;color:var(--txt);font-size:13.5px;cursor:pointer;font-family:var(--sans)}
.opt:hover{border-color:var(--acc)}
.opt.correct{border-color:var(--grn);background:rgba(87,201,131,.12)}
.opt.wrong{border-color:var(--red);background:rgba(229,105,94,.10)}
.score5{display:flex;gap:6px;margin-top:8px}
.score5 button{width:40px;height:36px;border-radius:3px;border:1px solid var(--line);background:var(--card2);color:var(--txt);font-weight:700;cursor:pointer;font-family:var(--mono)}
.score5 button:hover{border-color:var(--gold)}
/* diagnosis game */
.pullgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:8px;margin:10px 0}
.pull{background:var(--card2);border:1px solid var(--line);border-radius:4px;padding:10px 12px;cursor:pointer;font-size:12.5px;transition:border-color .12s ease}
.pull:hover{border-color:var(--gold)}
.pull.open{cursor:default;border-color:#3A5A45;background:#14181B}
.pull .pt{font-weight:700;font-size:12px;display:flex;justify-content:space-between;gap:6px}
.pull .pc{color:var(--dim);font-size:11px}
.pull table{width:100%;border-collapse:collapse;margin-top:6px;font-family:var(--mono);font-size:10.5px;font-variant-numeric:tabular-nums}
.pull td,.pull th{padding:2px 3px;text-align:right;border-bottom:1px solid #232430;color:var(--txt);font-weight:400}
.pull th{color:var(--dim);font-weight:600;text-transform:uppercase;font-size:9px;letter-spacing:.05em}
.pull td:first-child,.pull th:first-child{text-align:left}
.dneg{color:var(--red)}.dpos{color:var(--grn)}
/* sizing builder */
.chainrow{display:flex;align-items:center;gap:8px;margin:7px 0;flex-wrap:wrap}
.node{flex:1;min-width:190px;background:var(--card2);border:1px solid var(--line);border-radius:4px;padding:8px 10px;cursor:pointer}
.node.pred{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)}
.node .nl{font-size:11.5px;color:var(--dim);display:flex;justify-content:space-between;gap:6px}
.node .nl b{color:var(--txt);font-family:var(--mono);font-size:11px}
.runchip{font:700 11px var(--mono);color:var(--gold);background:rgba(206,129,71,.1);border:1px solid rgba(206,129,71,.35);border-radius:4px;padding:5px 8px;white-space:nowrap;font-variant-numeric:tabular-nums}
.opch{font:700 13px var(--mono);color:var(--dim)}
.brow{display:flex;align-items:center;gap:8px;margin:4px 0;font-size:11.5px}
.brow .bl{width:170px;color:var(--dim);text-align:right;flex:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.brow .bt{flex:1;height:13px;background:#15161C;border-radius:3px;overflow:hidden}
.brow .bt i{display:block;height:100%;background:var(--acc)}
.brow .bv{font-family:var(--mono);font-size:10.5px;width:64px;flex:none}
.stmt{background:#15161C;border:1px solid var(--line);border-radius:4px;padding:9px 10px;font-size:12px}
svg text{font-family:var(--sans)}
.narr{background:var(--card2);border-left:3px solid var(--gold);border-radius:0 4px 4px 0;padding:10px 12px;margin:10px 0;font-size:13.5px;min-height:44px}
:is(button,input,textarea,select,.acc-h,.pull,.node):focus-visible{outline:2px solid var(--acc);outline-offset:2px}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="eyebrow">Private &amp; Confidential · Prepared for B. Badwal</div>
  <h1>MBB Case Prep Trainer</h1>
  <span class="sub">Diagnosis playgrounds · generative drills · spaced repetition · Fall 2026 gates</span>
</header>
<nav id="nav"></nav>

<section id="home"></section>
<section id="queue"></section>
<section id="gym"></section>
<section id="dojo"></section>
<section id="syn"></section>
<section id="hint"></section>
<section id="chains"></section>
<section id="map"></section>
<section id="diag"></section>
<section id="size"></section>
<section id="exh"></section>
<section id="pe"></section>
</div>
<div class="toast" id="toast"></div>
<footer><b>Space</b> reveal / advance · <b>1/2/3</b> grade chains &amp; queue — progress saves automatically in this browser</footer>
<script>
"use strict";
/* ============ UTIL + STORE ============ */
const $=id=>document.getElementById(id);
const pick=a=>a[Math.floor(Math.random()*a.length)];
const R=(a,b)=>Math.round(a+Math.random()*(b-a));
const f1=x=>(Math.round(x*10)/10).toFixed(1);
const pc=n=>(n>=0?"+":"")+(Math.round(n*10)/10)+"%";
function fmt(n){if(!isFinite(n))return"—";const a=Math.abs(n);if(a>=1e9)return(n/1e9).toFixed(2).replace(/\.?0+$/,"")+"B";if(a>=1e6)return(n/1e6).toFixed(2).replace(/\.?0+$/,"")+"M";if(a>=1e3)return(n/1e3).toFixed(1).replace(/\.?0+$/,"")+"K";return String(Math.round(n*100)/100)}
const today=()=>new Date().toISOString().slice(0,10);
const S={get(k,d){try{const v=localStorage.getItem("bkl_"+k);return v?JSON.parse(v):d}catch(e){return d}},
set(k,v){try{localStorage.setItem("bkl_"+k,JSON.stringify(v))}catch(e){}}};
/* ============ SRS (Leitner) ============ */
const INTERVALS=[0,1,3,7,14,30];
let SR;
function srLoad(){SR=S.get("srs",{items:{},sk:{},log:{},pg:{}}); SR.items=SR.items||{}; SR.sk=SR.sk||{}; SR.log=SR.log||{}; SR.pg=SR.pg||{};}
function srSave(){S.set("srs",SR)}
function logRep(){SR.log[today()]=(SR.log[today()]||0)+1; srSave()}
function gradeItem(id,g){const it=SR.items[id]||{b:0,n:0,m:0};
 it.n++; if(g===1){it.b=1;it.m++} else if(g===2){it.b=Math.max(1,it.b)} else {it.b=Math.min(6,(it.b||0)+1)}
 const d=new Date(); d.setDate(d.getDate()+INTERVALS[Math.min(it.b,6)-1]);
 it.due=d.toISOString().slice(0,10); SR.items[id]=it; logRep(); renderNav();}
function gradeSkill(id,ok){const a=SR.sk[id]||[]; a.push(ok?1:0); if(a.length>20)a.shift(); SR.sk[id]=a; logRep();}
function skillAcc(id){const a=SR.sk[id]||[]; return a.length?a.reduce((x,y)=>x+y,0)/a.length:null}
function dueIds(){const t=today(); return CHAIN_IDS.filter(id=>{const it=SR.items[id]; return it&&it.due&&it.due<=t})}
function newIds(){return CHAIN_IDS.filter(id=>!SR.items[id])}
function streak(){let s=0,d=new Date(); if(!SR.log[today()])d.setDate(d.getDate()-1);
 while(SR.log[d.toISOString().slice(0,10)]){s++;d.setDate(d.getDate()-1)} return s}
/* ============ PLAYGROUND SHARED ============ */
function pgDone(k){if(!SR.pg[k]){SR.pg[k]=today(); srSave(); return true} return false}
let toastT;
function toast(m){const t=$("toast"); t.textContent=m; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),2800)}
function sld(id,lab,min,max,step,val,fn){return `<div class="sl"><div class="sl-h"><span>${lab}</span><b id="${id}v"></b></div><input type="range" id="${id}" min="${min}" max="${max}" step="${step}" value="${val}" oninput="${fn}()"></div>`}
const sv=id=>parseFloat($(id).value);
const setv=(id,t)=>{$(id+"v").textContent=t};
function co(cls,html){return `<div class="callout co-${cls}">${html}</div>`}
const CHALS={
diag:[["diag1","Clean kill","diagnose a case correctly using 4 pulls or fewer — segment first, then drill."],
["diag2","Us vs them","solve a case where the market check was the decisive pull (company problem vs industry problem)."],
["diag3","The mix hunter","correctly call a mix-shift case — flat revenue hiding a margin disease. Your field-guide nemesis."],
["diag4","Five straight","get 5 consecutive correct root-cause calls at any efficiency."]],
size:[["size1","In the band","land inside the reference band on any prompt — with your own assumptions, not the defaults."],
["size2","Triangulated","get top-down and bottom-up within 25% of each other on the same prompt."],
["size3","Swing spotter","predict the highest-leverage assumption before revealing the tornado — 3 times."]],
exh:[["exh1","First read","self-grade 3/3 on any exhibit — observation, so-what, and implication all landed."],
["exh2","Pattern proof","score a solid read on 5 different exhibit patterns."]],
pe:[["pe1","Operator's deal","build a 3.0x+ MOIC with zero multiple expansion (exit ≤ entry multiple)."],
["pe2","Beta detector","construct a deal where market growth drives 60%+ of EBITDA growth — then read why CDD would push back on the price."],
["pe3","Low-leverage alpha","hit a 25%+ IRR with debt at 40% or below of entry EV."]],
};
function chalHTML(mod){return `<div class="panel"><h3 style="margin:0 0 4px">Challenges</h3>`+CHALS[mod].map(c=>`<div class="chal ${SR.pg[c[0]]?'done':''}" id="ch_${c[0]}"><div class="cbx">${SR.pg[c[0]]?'✓':''}</div><div><b>${c[1]}</b> — ${c[2]}</div></div>`).join("")+`</div>`}
function chalHit(k){if(pgDone(k)){const c=CHALS[k.replace(/\d+$/,"")].find(x=>x[0]===k); const el=$("ch_"+k); if(el){el.classList.add("done"); el.querySelector(".cbx").textContent="✓"} toast("Challenge complete: "+(c?c[1]:k))}}
/* ============ KEYBOARD ============ */
window.KB={};
document.addEventListener("keydown",e=>{
 if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA"||e.target.tagName==="SELECT")return;
 if(e.code==="Space"||e.code==="Enter"){e.preventDefault(); KB.space&&KB.space();}
 if(e.key>="1"&&e.key<="3"&&KB.grade)KB.grade(+e.key);
});
</script>
<script>
"use strict";
/* ============ CASE-TYPE MAP (v1 content) ============ */

 revseg:{t:"Revenue by segment",c:1,render:d=>dgTable(d.segs.map((s,i)=>[s.n,"$"+f1(s.p*s.v)+"M","$"+f1(d.s1[i].p*d.s1[i].v)+"M",dgDelta(s.p*s.v,d.s1[i].p*d.s1[i].v)]),["Segment","LY","TY","Δ"])},
 pv:{t:"Price vs volume by segment",c:1,render:d=>dgTable(d.segs.flatMap((s,i)=>[[s.n+" · price","$"+f1(s.p),"$"+f1(d.s1[i].p),dgDelta(s.p,d.s1[i].p)],[s.n+" · volume",f1(s.v),f1(d.s1[i].v),dgDelta(s.v,d.s1[i].v)]]),["Driver","LY","TY","Δ"])},
 margin:{t:"Margin & mix by segment",c:1,render:d=>{const r1=d.r1;return dgTable(d.segs.map((s,i)=>{const gm1=(d.s1[i].p-d.s1[i].vc)/d.s1[i].p*100;return [s.n,Math.round(s.gm*100)+"%",Math.round(gm1)+"%",Math.round(d.s1[i].p*d.s1[i].v/r1*100)+"% of rev"]}),["Segment","GM% LY","GM% TY","Mix TY"])}},
 varcost:{t:"Variable cost per unit",c:1,render:d=>dgTable(d.segs.map((s,i)=>[s.n,"$"+f1(s.vc),"$"+f1(d.s1[i].vc),dgDelta(s.vc,d.s1[i].vc)]),["Segment","LY","TY","Δ"])},
 fixed:{t:"Fixed costs by line",c:1,render:d=>dgTable(d.fx.map((f,i)=>[f.n,"$"+f1(f.a)+"M","$"+f1(d.f1x[i].a)+"M",dgDelta(f.a,d.f1x[i].a)]),["Line","LY","TY","Δ"])},

function dgCauses(d){
 const list=[];
 d.segs.forEach(s=>{list.push(["A",s.n,"Price erosion in "+s.n]);list.push(["B",s.n,"Volume / share loss in "+s.n]);});
 list.push(["C",null,"Market-wide demand decline"]);

 else list.push(["D",null,"Mix shift toward lower-margin business"]);
 list.push(["E",null,"Variable-cost inflation (input costs)"]);
 list.push(["F",null,"Fixed-cost step-up"]);
 d.segs.forEach(s=>list.push(["G",s.n,"Discount-driven growth in "+s.n+" (bought volume)"]));
 return list;
}
function dgCorrectIdx(d,list){
 return list.findIndex(([k,seg])=>{
  if(k!==d.fk)return false;
  if(k==="A"||k==="B"||k==="G")return seg===d.segs[d.si].n;
  return true;});
}
function renderDiag(){
 DG=dgGen(); DG.pulled=[]; DG.done=false;
 const d=DG;
 $("diag").innerHTML=`<div class="card">
 <h2>Profit Diagnosis <span class="pill p-diag">playground · generative</span></h2>

 <div class="pullgrid" id="dgGrid"></div>

  <div class="prog" style="margin:4px 0 0">Cause first, then the single move you'd lead with. No partial credit for hedging — commit.</div></div>
 <div id="dgVerdict"></div>
 <div class="ans" id="dgReveal" style="white-space:normal"></div>
 <div class="btnrow"><button class="ghost" id="dgNext" style="display:none" onclick="renderDiag()">Next case →</button></div>
 </div>
 <div class="pg" style="grid-template-columns:1fr 310px"><div></div>${chalHTML("diag")}</div>`;
 const grid=$("dgGrid");
 Object.entries(DG_PULLS).forEach(([k,p])=>{
  const el=document.createElement("div");el.className="pull";el.id="dgp_"+k;
  el.innerHTML=`<div class="pt"><span>${p.t}</span><span class="pc">${p.c} pull</span></div>`;
  el.onclick=()=>dgPull(k);grid.appendChild(el);});
 const cs=$("dgCause");DG.causeList=dgCauses(d);
 cs.innerHTML=`<option value="-1">— root cause —</option>`+DG.causeList.map((c,i)=>`<option value="${i}">${c[2]}</option>`).join("");
 $("dgLever").innerHTML=`<option value="-1">— lead move —</option>`+DG_LEVERS.map((l,i)=>`<option value="${i}">${l}</option>`).join("");
 KB={space:()=>{if(DG.done)renderDiag()}};
}
function dgPull(k){
 if(DG.done||DG.pulled.includes(k))return;
 if(DG.pulled.length>=5){toast("Out of pulls — make the call.");return}
 DG.pulled.push(k);
 const el=$("dgp_"+k);el.classList.add("open");
 el.innerHTML=`<div class="pt"><span>${DG_PULLS[k].t}</span><span class="pc">pulled</span></div>`+DG_PULLS[k].render(DG);
 $("dgB").textContent=5-DG.pulled.length;
}
function dgCall(){
 if(DG.done)return;
 const ci=+$("dgCause").value, li=+$("dgLever").value;
 if(ci<0||li<0){toast("Pick a cause AND a lead move.");return}
 DG.done=true;
 const d=DG,f=FAULTS[d.fk];
 const correct=ci===dgCorrectIdx(d,DG.causeList);
 const leverOK=li===f.lever;
 const opt=f.opt.length, used=DG.pulled.length;
 const stars=used<=opt?"★★★":used<=opt+1?"★★":"★";
 gradeSkill("g_diag",correct); if(correct)gradeSkill("g_lever",leverOK);
 SR.cnt=SR.cnt||{}; SR.cnt.dstreak=correct?(SR.cnt.dstreak||0)+1:0; srSave();
 $("dgVerdict").innerHTML=`<div class="callout ${correct?'co-g':'co-r'}"><b>${correct?"Correct diagnosis.":"Wrong call."}</b> ${correct?"":"It was: <b>"+f.label(d.segs[d.si].n,d.loI>=0?d.segs[d.loI].n:"")+"</b>. "}Lead move: ${leverOK?'<b class="ok">right lever.</b>':'the stronger move was <b>“'+DG_LEVERS[f.lever]+'”</b>.'} Path efficiency: <b style="color:var(--gold)">${stars}</b> (${used} pulls vs ${opt} on the model path).</div>`;
 const rv=$("dgReveal");
 rv.innerHTML=`<b style="color:var(--gold)">What actually happened:</b> ${f.label(d.segs[d.si].n,d.loI>=0?d.segs[d.loI].n:"")} — profit walked from $${f1(d.p0)}M to $${f1(d.p1)}M.<br><br>
 <b style="color:var(--acc)">Model investigation path (${opt} pulls):</b> ${f.opt.map(k=>DG_PULLS[k].t).join(" → ")}.<br><br>
 <b style="color:var(--acc)">The lesson:</b> ${f.note}`;
 rv.classList.add("show");
 $("dgNext").style.display="";
 if(correct&&used<=4)chalHit("diag1");
 if(correct&&(d.fk==="B"||d.fk==="C")&&DG.pulled.includes("market"))chalHit("diag2");
 if(correct&&d.fk==="D")chalHit("diag3");
 if((SR.cnt.dstreak||0)>=5)chalHit("diag4");
}

const peRef=[
["Deal-screen structure (say it plainly)","1. THESIS — one sentence: why does this deal make money?\n2. MARKET — size, growth, cyclicality, fragmentation.\n3. COMPANY — share & moat, recurring revenue %, unit economics, management depth.\n4. VALUE CREATION — pricing, ops, add-ons, professionalization. Rank them.\n5. EXIT — who buys in 5 years, at what multiple, and why.\n6. RISKS & DILIGENCE PRIORITIES — top 3, ranked, with what you'd test."],
["Value-creation levers (the operator menu)","REVENUE: pricing (most underused in LMM), sales professionalization (CRM, comp plans), attach/cross-sell, geographic infill.\nCOST: procurement, labor scheduling, SG&A discipline, tech-enabled workflow (one sentence, then move on).\nCAPITAL: working-capital tightening, add-on M&A at lower multiples (arbitrage), asset-light shifts.\nSay: growth levers > cost levers for exit multiple; both matter for cash."],
["Don't over-technicalize — translation table","Say 'adjusting for one-time items' — not 'QoE bridge'.\nSay 'the debt paydown adds to equity value' — not 'deleveraging accretes to the residual'.\nSay 'we'd check how much revenue repeats each year' — not 'gross logo retention decomposition'.\nOne technical term per answer, MAX, and only if it earns its place. You are proving judgment, not certification."],
["Sponsor-case red flags (rattle off any 4)","Customer concentration >20% top-1 · owner IS the business (key-person) · project vs recurring mix drifting wrong · deferred capex/maintenance · one-time boosts dressed as run-rate · receivables aging out · churn hidden by gross adds · change-of-control clauses in key contracts."]];
function renderPE(){
 $("pe").innerHTML=`<div class="card">
 <h2>PE / CDD Cockpit <span class="pill p-diag">playground</span></h2>
 <div class="prog">This is what MBB does for sponsors: decompose a target's growth into <b>market beta vs share alpha vs margin plan</b> — then see what those CDD findings do to the deal math. Market fixed at <b>$1,000M</b> today; entry at year 0, exit end of year 5.</div>
 <div class="pg">
  <div>
   <div class="panel"><h3 style="margin-top:0">CDD lens — the growth story</h3>
    ${sld("peG","Market growth (%/yr)",-2,12,0.5,4,"updPE")}
    ${sld("peS0","Client share today (%)",5,40,1,15,"updPE")}
    ${sld("peS5","Share in year 5 — the CIM's claim (%)",5,40,1,17,"updPE")}
    ${sld("peM0","EBITDA margin today (%)",10,35,1,20,"updPE")}

   </div>
   <div class="panel"><h3 style="margin-top:0">Deal terms</h3>
    ${sld("peEM","Entry multiple (× EBITDA)",5,12,0.5,8,"updPE")}
    ${sld("peXM","Exit multiple (× EBITDA)",5,12,0.5,8.5,"updPE")}
    ${sld("peLev","Debt at entry (% of EV)",30,70,5,50,"updPE")}
    ${sld("peFCF","FCF conversion → debt paydown (% of EBITDA)",20,60,5,35,"updPE")}
   </div>

  </div>

   </div></div>
   <div class="panel"><h3 style="margin-top:0">Where the EBITDA growth comes from — the CDD verdict</h3>

function peCalc(){
 const g=sv("peG")/100,s0=sv("peS0")/100,s5=sv("peS5")/100,m0=sv("peM0")/100,m5=sv("peM5")/100;
 const em=sv("peEM"),xm=sv("peXM"),lev=sv("peLev")/100,fcf=sv("peFCF")/100;
 const E=[];for(let t=0;t<=5;t++){const M=1000*Math.pow(1+g,t),S=s0+(s5-s0)*t/5,mu=m0+(m5-m0)*t/5;E.push(M*S*mu);}

 let P=0;for(let t=1;t<=5;t++)P+=E[t]*fcf; P=Math.min(P,D0);
 const Qn=E[5]*xm-(D0-P);
 const moic=Qn/Q0, irr=(Math.pow(Math.max(moic,0.01),1/5)-1)*100;
 return{g,s0,s5,m0,m5,em,xm,lev,fcf,E,aM,aS,aMu,EV0,D0,Q0,P,Qn,moic,irr};
}
function updPE(){

 setv("peEM",d.em+"x");setv("peXM",d.xm+"x");setv("peLev",Math.round(d.lev*100)+"%");setv("peFCF",Math.round(d.fcf*100)+"%");
 const mEl=$("peMOIC");mEl.textContent=d.moic.toFixed(2)+"x";mEl.style.color=d.moic>=2.5?"var(--grn)":d.moic>=1.8?"var(--yel)":"var(--red)";
 $("peIRR").textContent=f1(d.irr)+"%";
 $("peE").textContent="$"+Math.round(d.E[0])+"→$"+Math.round(d.E[5])+"M";
 /* attribution */
 const dE=d.E[5]-d.E[0];const tot=Math.abs(d.aM)+Math.abs(d.aS)+Math.abs(d.aMu)||1;
 const rows=[["Market growth (beta)",d.aM,"#3E4050"],["Share gain (alpha — prove it)",d.aS,"#89A9CF"],["Margin plan (execution)",d.aMu,"#CE8147"]];
 $("peAttr").innerHTML=rows.map(([l,v,c])=>`<div class="brow"><span class="bl">${l}</span><div class="bt"><i style="width:${Math.max(2,Math.abs(v)/tot*100)}%;background:${v<0?"var(--red)":c}"></i></div><span class="bv">${v>=0?"+":"−"}$${Math.abs(v).toFixed(1)}M</span></div>`).join("")
 +`<div class="prog" style="margin:6px 0 0">ΔEBITDA = <b style="color:var(--gold)">${dE>=0?"+":""}$${dE.toFixed(1)}M</b> over 5 yrs — decomposition is exact; this is the chart a CDD report is built around.</div>`;
 /* value bridge waterfall */
 const growth=(d.E[5]-d.E[0])*d.em, mult=d.E[5]*(d.xm-d.em), pay=d.P;
 let run=d.Q0,maxV=Math.max(d.Q0,d.Qn);
 const blocks=[{l:"Entry<br>equity",b:0,h:d.Q0,c:"#89A9CF",t:"$"+Math.round(d.Q0)}];
 [["EBITDA<br>growth",growth],["Multiple<br>change",mult],["Debt<br>paydown",pay]].forEach(([l,v])=>{
  const b=Math.min(run,run+v);blocks.push({l,b,h:Math.abs(v),c:v>=0?"var(--grn)":"var(--red)",t:(v>=0?"+":"−")+Math.round(Math.abs(v))});run+=v;maxV=Math.max(maxV,b+Math.abs(v));});
 blocks.push({l:"Exit<br>equity",b:0,h:d.Qn,c:"#CE8147",t:"$"+Math.round(d.Qn)});
 const px=v=>Math.max(0,v/maxV*160);
 $("peW").innerHTML=blocks.map(b=>`<div class="wcol"><div class="wstack"><div class="wval">${b.t}</div><div class="wblk" style="height:${Math.max(2,px(b.h))}px;margin-bottom:${px(b.b)}px;background:${b.c}"></div></div><div class="wlab">${b.l}</div></div>`).join("");
 /* callouts */
 const cos=[];const betaShare=d.aM/(Math.abs(d.aM)+Math.abs(d.aS)+Math.abs(d.aMu)||1);
 if(betaShare>0.6&&dE>0)cos.push(co("r",`<b>You're buying beta.</b> ${Math.round(betaShare*100)}% of the EBITDA growth is just the market rising — anyone who buys anything in this space gets that. CDD translation: the target deserves a MARKET price, not a premium; the premium has to be earned by the share and margin claims, and here they're small.`));
 if(d.aS>0&&d.aS/(dE||1)>0.35)cos.push(co("w",`<b>The share-gain claim is carrying $${d.aS.toFixed(0)}M of the story.</b> That's the number to attack hardest in diligence: win-rate trends from the CRM, cohort retention, customer interviews, competitor churn. CIM share claims usually rest on a friendly market definition — rebuild the denominator.`));
 if(d.aMu>0&&d.aMu/(dE||1)>0.35)cos.push(co("w",`<b>Margin expansion is doing heavy lifting</b> (+$${d.aMu.toFixed(0)}M). Ask: which specific costs, who has done this playbook before, and why didn't the current owner already take it? 'Professionalization' without named line items is hope in a blazer.`));
 if(d.xm>d.em+1)cos.push(co("w",`<b>Multiple expansion is ${Math.round(d.E[5]*(d.xm-d.em))}M of the bridge.</b> That's the fragile kind of return — you're underwriting the EXIT market's mood. Deals that need the multiple to work are the ones that break in 2027.`));
 if(d.xm<=d.em&&d.moic>=2.2)cos.push(co("g",`<b>Operator's math:</b> the return clears with zero help from the exit multiple — growth and paydown carry it. This is the deal shape ICs love and CDD exists to validate.`));
 if(dE<0)cos.push(co("r",`<b>EBITDA shrinks over the hold.</b> Leverage on a declining asset is how MOIC goes below 1x fast — either the price must fall or the thesis is wrong.`));
 cos.push(co("i",`<b>Say it in the room:</b> "Returns come from three places — earnings growth, multiple change, and debt paydown. Here it's ${Math.round(Math.abs(growth)/(Math.abs(growth)+Math.abs(mult)+Math.abs(pay))*100)}% / ${Math.round(Math.abs(mult)/(Math.abs(growth)+Math.abs(mult)+Math.abs(pay))*100)}% / ${Math.round(Math.abs(pay)/(Math.abs(growth)+Math.abs(mult)+Math.abs(pay))*100)}% — and the growth piece is ${Math.round(betaShare*100)}% market beta." That sentence is the whole cockpit.`));
 $("peCO").innerHTML=cos.slice(0,4).join("");
 /* challenges */
 if(d.moic>=3&&d.xm<=d.em)chalHit("pe1");
 if(betaShare>0.6&&dE>0)chalHit("pe2");
 if(d.irr>=25&&d.lev<=0.4)chalHit("pe3");
}
/* ============ INTERVIEWER CHAINS ============ */
const CASE_CHAINS=[
{t:"prof",title:"Profitability interrogation",desc:"The drill-down they run on every diagnosis",nodes:[
{q:"Profits are down 20%. Where do you start?",a:"Segment before diving. First split the P&L — revenue problem, cost problem, or both. Then WHERE: which segment, region, or product holds the decline. Then us-vs-them: is the market down or just us. Saying those two axes out loud — locate first, explain second — is what separates a diagnosis from a guess."},
{q:"Revenue is flat. Does that kill the revenue branch?",a:"No — flat totals hide mix. Decompose price × volume × mix BY SEGMENT: high-margin volume can fall while low-margin volume grows and the total never moves, yet margin per customer bleeds out. Interrogate the composition before you leave the branch — flat is a description, not an exoneration."},
{q:"You find the decline lives in one segment. Next question?",a:"Us or them, in that segment: did the segment's market shrink, or did we lose share within it? Same symptom, opposite prescriptions — a market decline calls for capacity and cash discipline; share loss calls for a competitive response. One data pull (market growth + competitor performance) separates them."},
{q:"It's share loss. Why might that be happening?",a:"Ranked hypotheses, not a laundry list: price (being undercut), product (feature or quality gap), place (channel coverage), promotion (share of voice), service (churn triggers). Then ask which data exists to discriminate between the top two. A ranked list with a test beats ten possibilities."},
{q:"And if EVERY competitor is losing to the same new entrant?",a:"Reframe — that's disruption, not rivalry. The basis of competition changed: a new cost model, channel, or technology. The response menu changes too: match the model, differentiate up-market, acquire the threat, or harvest the base. Matching on price alone against a structurally cheaper model destroys value — say that before someone proposes it."}]},
{t:"entry",title:"Market entry pressure test",desc:"Attractiveness, right-to-win, and the walk-away",nodes:[
{q:"Your market-attractiveness read is glowing. Why isn't the case over?",a:"Because attractiveness is one gate of three. Can WE win — do our assets, brand, cost position actually transfer? And does the math work — entry cost versus the profit stream, with a mode decision attached. Attractive markets you can't win are traps with good lighting."},
{q:"What does 'can we win' actually mean?",a:"A specific, nameable advantage that survives translation into the new market: sourcing scale, a brand that means something there, distribution we can reuse, a regulatory asset. Plus the incumbent response — your advantage has to survive their counterpunch, not just day one."},
{q:"Walk me through entry-mode logic.",a:"Build, buy, or partner — traded off on speed, control, capital, and integration risk. Organic is cheap and slow; acquisition buys speed and local capability at a premium plus integration risk; JV shares economics for local knowledge. Tie the choice to the window: fast-closing opportunity favors buy."},
{q:"Give me the walk-away math.",a:"Entry cost plus ramp losses versus the PV of steady-state profits; the breakeven year against a stated hurdle; and the comparison nobody does — the same capital deployed in the core business. State the kill threshold BEFORE the analysis: 'if breakeven is past year 4, we don't enter.' Numbers first, then courage."},
{q:"The incumbent cuts prices 15% the day you enter. Now what?",a:"Game it before entering: their pain tolerance versus ours — who has the structurally lower cost base and deeper war chest? Options: match (only if we win a price war), reposition premium, or target segments they under-serve. The pre-commitment discipline: if we can't fund 18 months of response, we don't enter at all."}]},
{t:"size",title:"Sizing defense",desc:"Defending your number under fire",nodes:[
{q:"Defend your unit of analysis.",a:"Match the unit to how the product is consumed: households for media, utilities, streaming (one sub serves a family — individuals overcount 2-3x); individuals for personal products; transactions for retail and food. Saying the rule out loud before computing is what makes the whole build credible."},
{q:"Your top-down and bottom-up disagree by 3x. What now?",a:"Don't average — reconcile. Find the divergent assumption (it's almost always penetration or frequency), test it against an anchor, and fix the build that's lying. Triangulation only earns its name when disagreement triggers investigation rather than a blend."},
{q:"You can buy real data for exactly ONE assumption. Which?",a:"The tornado winner: highest answer-swing × lowest confidence. Buying precision on a low-swing assumption is theater. This is also the interview answer to 'what would you validate first' — name the assumption that owns the answer."},
{q:"Interviewer: your answer is double the actual number. React.",a:"Calmly own it and locate it: 'then one of my inputs runs hot — most likely penetration; at half that, I land on the actual.' No defensiveness, no collapse. The recovery under correction IS the test — a graceful self-repair scores higher than a lucky first answer."},
{q:"Convert your TAM into a 'so what'.",a:"TAM → serviceable slice (geography, segment, channel we can actually reach) → target share WITH a because (capacity, competition, comparable ramps) → revenue potential against the client's goal. A TAM without a capture story is trivia; the last sentence should answer the client's actual question."}]},
{t:"price",title:"Pricing cross-exam",desc:"Anchors, elasticity math, and tier design",nodes:[
{q:"Three pricing anchors — go.",a:"Cost floor (unit economics — below this every sale destroys value), competitive cross-check (what alternatives cost), value ceiling (economic value created for the customer). Price lives in that band; where in the band is a segmentation and strategy question, not an accounting one."},
{q:"Client wants to cut price 15% to gain share. Do the math.",a:"At a 30% contribution margin, a 15-point cut leaves 15% margin — you need volume × 30/15 = DOUBLE the volume to hold contribution flat. Then the elasticity reality check: is demand anywhere near that responsive, and will competitors just match (nobody gains share, everybody loses margin)? This math kills most price cuts — do it out loud."},
{q:"How do you find willingness to pay?",a:"Triangulate: economic value to the customer (time saved × wages, revenue enabled, cost avoided), conjoint or survey data haircut for optimism, A/B tests on new cohorts, and competitor price deltas for positioning. Customers misreport WTP in surveys — behavioral evidence outranks stated evidence."},
{q:"One price or tiers?",a:"Heterogeneous willingness to pay means tiers — good-better-best captures surplus a single price leaves on the table. Fence the tiers with real usage or feature boundaries so high-WTP customers can't buy down, and anchor the premium tier first. Most B2B pricing power hides in packaging, not the headline number."},
{q:"When is cost-plus actually right?",a:"Commodities, regulated markets, and cost-transparent contract work — where value pricing has no room or isn't allowed. Even there, index the pass-through so input inflation doesn't eat you. Everywhere else, cost-plus is a donation of consumer surplus to your customers — generous, but not strategy."}]},
{t:"pe",title:"PE screen deep-dive",desc:"The sponsor questions behind the sponsor questions",nodes:[
{q:"Screen this platform in 60 seconds.",a:"Thesis in one line — why does this make money. Market: size, growth, fragmentation, cyclicality. Company: recurring revenue %, moat, unit economics, management depth. Value creation: ranked levers, not a list. Exit: who buys it in five years and why. Then the top-3 diligence questions. Six beats, one breath each."},
{q:"What makes revenue 'high quality'?",a:"Recurring or contracted, retention above 90%, diversified customers (no 20% logo), pricing power PROVEN by realized increases rather than claimed, and low key-person dependence in the selling motion. Quality of revenue is what the multiple is actually paying for."},
{q:"Everyone waves at 'add-on arbitrage.' Make it concrete.",a:"Platform at 8x, add-ons at 4-5x: every deal blends your entry multiple down and compounds the exit base. But the binding constraints are integration pace and management bandwidth — underwrite the CADENCE (deals per year the team can absorb), not the theoretical spread. Arbitrage without integration is just a collection of small companies."},
{q:"What kills roll-ups?",a:"Integration debt — systems, brand, culture piling up faster than it's paid down; scarce field labor; price discipline decaying in auctions as the fund needs to deploy; leverage meeting a rate reset; and founders coasting once the earnout is banked. Notice most of these are self-inflicted — the market rarely kills a roll-up; execution does."},
{q:"Exit story — who pays, and for what?",a:"Name the buyer type: the next-size sponsor (paying for scale and professionalization), a strategic (paying for synergies), rarely IPO in the lower middle market. Then what they pay for: durable growth, systems, a bench that survives the founder. If you can't name a credible buyer, the IRR is theoretical — the exit is part of the thesis, not an epilogue."}]},
{t:"cdd",title:"CDD interrogation",desc:"Prove the growth story — the sponsor work MBB actually sells",nodes:[
{q:"The CIM claims five straight years of share gains. First move?",a:"Decompose the growth: how much is market beta, how much is share, how much is price — the attribution chart. Then verify share INDEPENDENTLY: competitor revenues, customer wallet studies, win/loss data. CIM share claims usually rest on a friendly market definition — rebuild the denominator before you believe the numerator."},
{q:"How do you actually prove a share-gain story?",a:"Win-rate trends from the CRM, cohort revenue retention, structured customer interviews (why do you buy, what would make you switch), and the mirror image — is the named competitor actually losing? If the 'gains' concentrate in one segment or two contracts, it's not a story, it's an anecdote."},
{q:"Management says the market grows 12%. Your build says 6%. Which goes in the model?",a:"Yours — triangulated two or three ways — as the base case. Take their 12% apart rather than dismissing it: usually the trick is category-definition inflation (adjacent segments smuggled in). Their number can live as an upside case carrying its own burden of proof. Paying for their denominator is how sponsors overpay politely."},
{q:"What does churn hide, and how do you catch it?",a:"Gross adds can mask logo churn for years — topline grows while the base rots. Split net revenue retention from logo retention, and pull cohort curves: newer cohorts decaying faster under a growing topline means the growth is bought, not earned. That's the exhibit pattern that kills more deals than any spreadsheet."},
{q:"Deliver the CDD verdict shape.",a:"Market: size, growth, durability — what a buyer gets just for showing up. Position: share trajectory and moat evidence, believed or haircut. Plan: which levers are credible at what discount. Then the deal read: how much of the growth is beta (pay market price) versus alpha (needs proof). The kill shot, in one sentence: 'you're being asked to pay an alpha price for beta growth.'"}]},
{t:"cap",title:"Capital allocation & the activist clock",desc:"Rationed capital, horizons, and divestiture math",nodes:[
{q:"The CFO has six projects and capital for three. Rank by what?",a:"Under capital rationing, profitability index — NPV per dollar of capex — not raw NPV. The biggest-NPV project is often the worst per dollar. Then overlay strategic fit and risk. Saying 'NPV per constrained dollar' out loud is the whole answer; the ranking is arithmetic."},
{q:"An activist just took 7%. What do they want?",a:"Value that lands inside their 1-2 year horizon: a divestiture, cost programs with fast payback, capital returns, board seats to force the pace. Long-dated NPV doesn't count in their clock — which reframes every 'good project' question into a 'good project WHEN' question."},
{q:"A restructuring has great NPV but the savings land in years 4-6. Verdict?",a:"Right project, wrong clock. In an activist context, horizon mismatch beats NPV — sequence it behind actions that pay inside the window, and communicate it as phase two so it isn't read as a dodge. Time-to-value is a first-class decision criterion, not a footnote."},
{q:"How do you pick the divestiture candidate?",a:"Lowest growth, weakest strategic fit, widest buyer pool — the widest pool gets the cleanest multiple. Value it simply: segment EBITDA × the market multiple. Then check what the headline hides: dis-synergies and stranded overhead that stay behind. Proceeds minus stranded costs is the real number."},
{q:"The sale clears the target with $700M left over. Finish the job.",a:"Never leave cash unassigned: buyback versus debt paydown versus reinvestment, chosen by relative returns from HERE (buyback yield vs after-tax cost of debt vs project IRRs). An unallocated residual in a board answer reads as unfinished analysis — the last dollar deserves a destination too."}]},
{t:"syn",title:"Synthesis under pushback",desc:"The close, attacked from four directions",nodes:[
{q:"'What would you tell the CEO?' — give me the shape.",a:"Recommendation first — one sentence. Two or three supports, at least one carrying a number. The key risk WITH its mitigant and early-warning trigger. Next step with an owner and a date. Forty-five seconds, answer-first, never a recap of your journey — the CEO wasn't on the journey and doesn't want the slideshow."},
{q:"The CEO says: 'interesting — we're doing the opposite.'",a:"Conviction without rigidity. One sentence re-anchoring why the analysis points where it points, then genuinely build the best version of THEIR path: safeguards, milestones, and a pre-agreed trigger to revisit. 'I'd still favor X; if we go Y, here's how we protect the downside and when we'd know.' That's an advisor, not an analyst."},
{q:"Your best option clears the math but violates the client's stated values.",a:"Economics versus strategic coherence — say the conflict out loud instead of pretending it isn't there. Recommend the values-consistent option that still clears the bar, and quantify the premium being paid for coherence. A plan that betrays the brand premise pays for itself in churn later; naming that trade IS the insight."},
{q:"Partner: 'your recommendation needs $50M we don't have.'",a:"Constraints reshape sequencing, not the answer. Find the self-funding first step, phase-gate the capital behind proof points, or shrink to a pilot whose economics unlock the next tranche. 'Same destination, funded staircase' — delivered without a flinch."},
{q:"Give me the 10-second version.",a:"One sentence: do X, because Y, and it's worth Z. If you can't compress it to that, you don't own the answer yet — the compression isn't a summary of the thinking, it's the proof the thinking finished. Practice the ten-second close as its own rep."}]}];

 <div class="tip"><b>The rule:</b> grade yourself brutally. A "shaky" you call "solid" comes back to bite you in a live case, not in this app.</div></div>
 <div class="card"><h3 style="margin-top:0">Housekeeping</h3><div class="btnrow"><button class="ghost" onclick="if(confirm('Wipe ALL local progress (drills + SRS)?')){['gym','dojo','syn','hint','srs'].forEach(k=>localStorage.removeItem('bkl_'+k));srLoad();show('home')}">Reset all local data</button></div></div>`;
 KB={};
}
/* ============ NAV / ROUTER ============ */
const TABS=[["home","Dashboard"],["queue","Review"],["gym","Structure Gym"],["dojo","Math Dojo"],["syn","Synthesis"],["hint","Hint Decoder"],["chains","Chains"],["map","Case Map"]];
const PGTABS=[["diag","Profit Diagnosis"],["size","Sizing Builder"],["exh","Exhibit Reader"],["pe","PE / CDD Cockpit"]];
let CUR="home";
function renderNav(){
 const due=dueIds().length;
 const btn=([id,l])=>`<button class="${CUR===id?'on':''}" onclick="show('${id}')">${l}${id==='queue'&&due?`<span class="b">${due}</span>`:""}</button>`;
 $("nav").innerHTML=`<div class="navrow">${TABS.map(btn).join("")}</div><div class="navrow"><span class="navtag">playgrounds</span>${PGTABS.map(btn).join("")}</div>`;
}
function show(id){
 CUR=id;clearInterval(GYM.t);clearInterval(SYN.t);clearInterval(DOJO.ti);clearInterval(EX.t);
 document.querySelectorAll("section").forEach(s=>s.classList.remove("on"));
 $(id).classList.add("on");renderNav();
 ({home:renderHome,queue:renderQueue,gym:renderGym,dojo:renderDojo,syn:renderSyn,hint:renderHint,chains:renderChains,map:renderMap,diag:renderDiag,size:renderSize,exh:renderExh,pe:renderPE})[id]();
 window.scrollTo(0,0);
}
/* ============ INIT ============ */
srLoad();show("home");
</script>
